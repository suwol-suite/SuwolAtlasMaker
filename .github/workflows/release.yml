name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag. Defaults to v<package.json version>."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run i18n:check
      - run: npm test
      - run: npm run build
      - run: npm run build:gui
      - run: npm run pack:win
      - run: npm run smoke:packaged:win
      - run: npm run zip:win
      - run: npm run verify:release:zip:win

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: release/archives/*win-x64.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run i18n:check
      - run: npm test
      - run: npm run build
      - run: npm run build:gui
      - run: npm run pack:linux
      - run: npm run smoke:packaged:linux
      - run: npm run zip:linux
      - run: npm run verify:release:zip:linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: release/archives/*linux-x64.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - id: release-meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            release_tag="${{ github.event.inputs.tag }}"
          else
            release_tag="v$(node -p "require('./package.json').version")"
          fi

          echo "tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: artifacts/**/*.zip
          generate_release_notes: true
